<!-- 
Atividade 03 – Flexbox (CSS)
Criar uma página .html que deverá conter uma estrutura com três cartões de conteúdo. 
Cada cartão deve apresentar:
 uma imagem, 
 um título, 
 um pequeno texto descritivo e 
 um botão com a expressão “Saiba mais”. 
Os temas sugeridos para os cartões são Tecnologia, Esportes e Educação, podendo ser 
utilizados textos curtos relacionados a cada assunto. 
O contêiner que envolve os cartões deverá utilizar a propriedade display: flex para 
organizar os elementos. Os cartões devem aparecer lado a lado quando a página for 
visualizada em telas maiores, com espaçamento entre eles. Dentro de cada cartão 
também é esperado que haja uma organização adequada dos elementos, podendo 
utilizar Flexbox para alinhar o conteúdo verticalmente ou distribuir melhor os elementos 
internos.
Além da organização básica do layout, a página deve apresentar um comportamento 
simples de responsividade. 
Caso haja tempo disponível, melhorar a aparência visual dos cartões adicionando cores, 
bordas, efeitos de hover, etc.
-->
